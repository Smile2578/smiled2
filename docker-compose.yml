services:
  # ─── Backend ────────────────────────────────────────────────────────────────
  smiled:
    build:
      context: ./smiled-server
      dockerfile: Dockerfile
    image: smiled/server:latest
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://smiled:${POSTGRES_PASSWORD:-smiled}@db:5432/smiled
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: smiled-docs
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set}
      JWT_EXPIRY_HOURS: "24"
      TENANT_MODE: ${TENANT_MODE:-single}
      DEFAULT_CABINET_ID: ${CABINET_ID:-00000000-0000-0000-0000-000000000001}
      CORS_ORIGINS: http://localhost:3000
      SERVER_PORT: "8080"
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ─── PostgreSQL 17 ──────────────────────────────────────────────────────────
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: smiled
      POSTGRES_USER: smiled
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-smiled}
    ports:
      - "5433:5432"  # Use 5433 locally to avoid conflict with system Postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smiled -d smiled"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  # ─── MinIO (S3-compatible) ──────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    volumes:
      - miniodata:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  pgdata:
  miniodata:
